name: Build and Deploy via SFTP

on:
  push:
    branches:
      - main
  # Also trigger after successful post generation
  workflow_run:
    workflows: ["Generate Daily Golf Post"]
    types:
      - completed

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Only deploy if triggered by push OR if post generation succeeded
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Need latest commit (including the generated post)
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static site
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.SITE_URL || 'https://ki.indigolf.de' }}
        run: npm run build

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP (lftp)
        env:
          SFTP_HOST: ${{ secrets.FTP_SERVER }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "$SFTP_USER,$SFTP_PASS" sftp://$SFTP_HOST << 'EOF'
          set sftp:auto-confirm yes
          set net:max-retries 3
          mirror --reverse --delete --verbose ./out/ public_html/ki/
          quit
          EOF
