name: Build and Deploy via SFTP

on:
  push:
    branches:
      - main
  # Also trigger after successful post generation
  workflow_run:
    workflows: ["Generate Daily Golf Post"]
    types:
      - completed

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Only deploy if triggered by push OR if post generation succeeded
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Need latest commit (including the generated post)
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static site
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.SITE_URL || 'https://ki.indigolf.de' }}
        run: npm run build

      - name: Create target directory via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          script: mkdir -p ~/public_html/ki

      - name: Deploy via SFTP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          source: ./out/*
          target: ~/public_html/ki/
          strip_components: 1
          overwrite: true
